<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0b0b12" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Leave the House</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">
  <div class="board">

    <div class="card now">
      <div class="nowTop">
        <div class="place" id="placeLine">Local</div>
        <div class="updated" id="updatedLine">Updated —</div>
      </div>

      <div class="tempRow">
        <div class="tempBlock">
          <div class="temp" id="tempNow">—°</div>
          <div class="feels" id="feelsNow">feels —°</div>
        </div>
        <div class="mode" id="modeIcon">☀️</div>
      </div>

      <div class="hero">
        <div class="heroLine" id="heroLine">—</div>
        <div class="heroSub" id="heroSub">—</div>
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <div class="card mini wear">
      <div class="miniLeft">
        <div class="miniLabel">Wear</div>
        <div class="miniValue" id="wearValue">—</div>
      </div>
      <div class="miniIcon">👖</div>
    </div>

    <div class="card mini walk walkCard" id="walkCard">
      <div class="miniLeft">
        <div class="miniLabel">Walk</div>
        <div class="miniValue" id="walkPrimary">—</div>
      </div>
      <div class="miniIcon" id="walkIcon">🐾</div>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
