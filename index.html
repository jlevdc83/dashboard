<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0b0b12" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Leave the House</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <div class="board">

    <section class="card now">
      <div class="nowTop">
        <div class="place" id="placeLine">Local</div>
        <div class="updated" id="updatedLine">Updated —</div>
      </div>

      <div class="tempRow">
        <div class="tempWrap">
          <div class="temp" id="tempNow">—°</div>
          <div class="feels" id="feelsNow">feels —°</div>
        </div>
        <div class="mode" id="modeIcon">☀️</div>
      </div>

      <div class="condition" id="conditionLine">—</div>

      <div class="stats" id="stats"></div>
    </section>

    <section class="card mini" id="wearCard">
      <div class="miniText">
        <div class="miniLabel">Wear</div>
        <div class="miniValue" id="wearValue">—</div>
      </div>
      <div class="miniIcon" id="wearIcon">👖</div>
    </section>

    <section class="card mini hidden" id="bringCard">
      <div class="miniText">
        <div class="miniLabel">Bring</div>
        <div class="miniValue" id="bringValue">—</div>
      </div>
      <div class="miniIcon" id="bringIcon">☔</div>
    </section>

    <section class="card mini hidden" id="protectCard">
      <div class="miniText">
        <div class="miniLabel">Protect</div>
        <div class="miniValue" id="protectValue">—</div>
      </div>
      <div class="miniIcon" id="protectIcon">🕶️</div>
    </section>

    <section class="card mini walkCard" id="walkCard">
      <div class="miniText">
        <div class="miniLabel">Walk</div>
        <div class="miniValue" id="walkValue">—</div>
        <div class="miniSub" id="walkSub">—</div>
      </div>
      <div class="miniIcon" id="walkIcon">🐾</div>
    </section>

  </div>
<script src="js/app.js"></script>
</body>
</html>
