<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0b0b12" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Leave the House</title>

<style>
  :root{
    --pad: 8px;
    --gap: 8px;

    --bgA:#070812;
    --bgB:#0b0d18;
    --bgC:rgba(140,180,255,.10);
    --bgD:rgba(120,255,220,.06);

    --fg:rgba(255,255,255,.94);
    --muted:rgba(255,255,255,.68);
    --soft:rgba(255,255,255,.12);
    --stroke:rgba(255,255,255,.14);
    --shadow:0 12px 28px rgba(0,0,0,.28);

    --accent:rgba(140,180,255,1);
    --accent2:rgba(150,255,220,1);

    --r:16px;
    --r2:14px;
  }

  *{ box-sizing:border-box }
  html,body{ width:100%; height:100%; margin:0; }
  body{
    overflow:hidden;
    color:var(--fg);
    font:12px/1.08 system-ui,-apple-system,"SF Pro Display","SF Pro Text",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    background:
      radial-gradient(1200px 680px at 10% -10%, var(--bgC), transparent 58%),
      radial-gradient(1000px 680px at 100% 0%, var(--bgD), transparent 62%),
      linear-gradient(180deg, var(--bgA), var(--bgB));
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .scene{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .scene svg{ width:100%; height:100%; display:block; }

  .mist{
    position:fixed; inset:-80px; z-index:0; pointer-events:none;
    filter: blur(24px);
    opacity:.45;
    background:
      radial-gradient(900px 480px at 15% 15%, color-mix(in srgb, var(--accent) 46%, transparent), transparent 62%),
      radial-gradient(900px 480px at 92% 8%, color-mix(in srgb, var(--accent2) 42%, transparent), transparent 62%);
  }

  .app{
    position:relative; z-index:1;
    width:100%;
    height:100vh;
    height:100svh;
    height:100dvh;
    display:grid;
    grid-template-rows: 1fr;
    overflow:hidden;
    padding: 6px;
  }

  .rotateHint{
    position:absolute; inset:8px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(0,0,0,.28);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:16px;
  }
  .rotateHint .t{ font-size:14px; font-weight:900; }
  .rotateHint .s{ margin-top:6px; color:var(--muted); font-size:11px; }

  @media (orientation: portrait){
    .dash{ display:none !important; }
    .rotateHint{ display:flex; }
  }

  .board{
    position:relative;
    overflow:hidden;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.12);
    background:
      radial-gradient(900px 500px at 10% -10%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, color-mix(in srgb, var(--accent2) 16%, transparent), transparent 60%),
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
    backdrop-filter: blur(14px) saturate(1.06);
    -webkit-backdrop-filter: blur(14px) saturate(1.06);
    box-shadow: var(--shadow);
    padding: 8px;
    display:grid;
    grid-template-rows: auto 1fr;
    gap:8px;
    min-height:0;
  }

  .board::after{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    border-radius:20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    opacity:.5;
  }

  .meta{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px;
    align-items:start;
    min-width:0;
  }
  .place{
    min-width:0;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding:2px 4px 0 4px;
  }
  .metaRight{
    min-width:0;
    text-align:right;
    padding:2px 4px 0 4px;
  }
  .updated{
    font-size:10px;
    color:var(--muted);
    font-weight:800;
    white-space:nowrap;
  }
  .headline{
    margin-top:2px;
    font-size:10px;
    color:var(--muted);
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:320px;
  }

  .grid{
    min-height:0;
    display:grid;
    grid-template-columns: 1.35fr .82fr .82fr;
    grid-template-rows: 1fr 1fr 62px;
    gap: var(--gap);
  }

  .card{
    border-radius: var(--r);
    border:1px solid var(--stroke);
    background:
      radial-gradient(300px 120px at 16% 0%, rgba(255,255,255,.12), transparent 62%),
      rgba(0,0,0,.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    overflow:hidden;
    min-width:0;
    min-height:0;
  }

  .now{
    grid-column:1;
    grid-row:1 / span 2;
    display:grid;
    grid-template-rows: auto 1fr auto;
    padding:12px;
    background:
      radial-gradient(420px 160px at 18% -6%, rgba(255,255,255,.18), transparent 62%),
      radial-gradient(420px 160px at 100% 0%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 62%),
      rgba(0,0,0,.08);
  }

  .nowTop{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .nowLabel{
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:900;
  }
  .nowMode{
    font-size:18px;
    line-height:1;
  }

  .tempBlock{
    align-self:center;
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:0;
  }
  .tempMain{
    display:flex;
    align-items:flex-end;
    gap:12px;
    min-width:0;
  }
  .temp{
    font-size:58px;
    font-weight:950;
    letter-spacing:-0.06em;
    line-height:.9;
    white-space:nowrap;
  }
  .feels{
    font-size:16px;
    font-weight:900;
    color:var(--muted);
    white-space:nowrap;
    padding-bottom:8px;
  }
  .heroLine{
    font-size:16px;
    font-weight:900;
    letter-spacing:-0.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .heroSub{
    font-size:12px;
    font-weight:800;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .nowStats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:6px 10px;
    margin-top:8px;
  }
  .stat{
    min-width:0;
  }
  .statTop{
    display:flex;
    align-items:center;
    gap:5px;
    min-width:0;
  }
  .statIcon{
    width:14px;
    flex:0 0 auto;
    text-align:center;
    font-size:11px;
  }
  .statK{
    min-width:0;
    font-size:8.5px;
    letter-spacing:.11em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .statV{
    margin-top:2px;
    font-size:13px;
    font-weight:950;
    letter-spacing:-0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .statB{
    margin-top:1px;
    font-size:9.5px;
    color:var(--muted);
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .miniCard{
    padding:9px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .miniLeft{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .miniLabel{
    font-size:9px;
    letter-spacing:.11em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:900;
    white-space:nowrap;
  }
  .miniValue{
    font-size:14px;
    font-weight:950;
    letter-spacing:-0.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .miniSub{
    font-size:10px;
    font-weight:800;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .miniIcon{
    width:36px;
    height:36px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.09);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:17px;
    flex:0 0 auto;
  }

  .wear{ grid-column:2; grid-row:1; }
  .bring{ grid-column:3; grid-row:1; }
  .protect{ grid-column:2; grid-row:2; }
  .dog{ grid-column:3; grid-row:2; }

  .footer{
    grid-column:1 / span 3;
    grid-row:3;
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:8px;
  }

  .bar{
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(0,0,0,.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 6px 18px rgba(0,0,0,.14);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:10px 12px;
    min-width:0;
  }
  .barLeft{ min-width:0; display:flex; flex-direction:column; gap:2px; }
  .barLabel{
    font-size:9px;
    letter-spacing:.11em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:900;
    white-space:nowrap;
  }
  .barValue{
    font-size:14px;
    font-weight:950;
    letter-spacing:-0.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .barSub{
    font-size:10px;
    color:var(--muted);
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .barIcon{
    width:34px;
    height:34px;
    border-radius:11px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.09);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    flex:0 0 auto;
  }

  .hidden{ display:none !important; }

  @media (max-height: 350px){
    .grid{ grid-template-rows: 1fr 1fr 56px; }
    .temp{ font-size:52px; }
    .heroLine{ font-size:15px; }
    .miniValue,.barValue,.statV{ font-size:12px; }
  }
</style>
</head>

<body>
<div class="scene" id="scene"></div>
<div class="mist"></div>

<div class="app">
  <div class="rotateHint">
    <div>
      <div class="t">Rotate to Landscape</div>
      <div class="s">Designed for iPhone 11 landscape kiosk mode.</div>
    </div>
  </div>

  <div class="dash board">
    <div class="meta">
      <div class="place" id="placeLine">Local</div>
      <div class="metaRight">
        <div class="updated" id="updatedLine">Updated —</div>
        <div class="headline" id="headlineLine">—</div>
      </div>
    </div>

    <div class="grid">
      <div class="card now">
        <div class="nowTop">
          <div class="nowLabel">Now</div>
          <div class="nowMode" id="nowMode">☀️</div>
        </div>

        <div class="tempBlock">
          <div class="tempMain">
            <div class="temp" id="tempNow">—°</div>
            <div class="feels" id="feelsNow">feels —°</div>
          </div>
          <div class="heroLine" id="heroLine">—</div>
          <div class="heroSub" id="heroSub">—</div>
        </div>

        <div class="nowStats" id="nowStats"></div>
      </div>

      <div class="card miniCard wear" id="wearCard">
        <div class="miniLeft">
          <div class="miniLabel">Wear</div>
          <div class="miniValue" id="wearValue">—</div>
          <div class="miniSub" id="wearSub">—</div>
        </div>
        <div class="miniIcon" id="wearIcon">👖</div>
      </div>

      <div class="card miniCard bring" id="bringCard">
        <div class="miniLeft">
          <div class="miniLabel">Bring</div>
          <div class="miniValue" id="bringValue">—</div>
          <div class="miniSub" id="bringSub">—</div>
        </div>
        <div class="miniIcon" id="bringIcon">☔</div>
      </div>

      <div class="card miniCard protect" id="protectCard">
        <div class="miniLeft">
          <div class="miniLabel">Protect</div>
          <div class="miniValue" id="protectValue">—</div>
          <div class="miniSub" id="protectSub">—</div>
        </div>
        <div class="miniIcon" id="protectIcon">🕶️</div>
      </div>

      <div class="card miniCard dog" id="dogCard">
        <div class="miniLeft">
          <div class="miniLabel">Dog walk</div>
          <div class="miniValue" id="dogValue">—</div>
          <div class="miniSub" id="dogSub">—</div>
        </div>
        <div class="miniIcon">🐾</div>
      </div>

      <div class="footer">
        <div class="bar">
          <div class="barLeft">
            <div class="barLabel">Best walk window</div>
            <div class="barValue" id="walkValue">—</div>
            <div class="barSub" id="walkSub">—</div>
          </div>
          <div class="barIcon">🕒</div>
        </div>

        <div class="bar">
          <div class="barLeft">
            <div class="barLabel">Rain timing</div>
            <div class="barValue" id="rainValue">—</div>
            <div class="barSub" id="rainSub">—</div>
          </div>
          <div class="barIcon">☔</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FALLBACK_ZIP = "20005";
const REFRESH_MS = 60 * 60 * 1000;
const RUN_HOT = true;

const $ = (id)=>document.getElementById(id);
const round = (n)=>Math.round(n);

function tzLocal(){ return Intl.DateTimeFormat().resolvedOptions().timeZone || "auto"; }
function fmtTimeLocal(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return new Intl.DateTimeFormat([], { hour:"numeric", minute:"2-digit" }).format(d);
}
function fmtUpdated(d){
  return new Intl.DateTimeFormat([], { weekday:"short", hour:"numeric", minute:"2-digit" }).format(d);
}
function sameHourIndex(timeArr, now){
  const nowMs = now.getTime();
  let idx = 0;
  for (let i=0;i<timeArr.length;i++){
    const t = new Date(timeArr[i]).getTime();
    if (t <= nowMs) idx = i;
    else break;
  }
  return idx;
}
function maxNextN(arr, start, n){
  let m = -Infinity;
  for (let i=0;i<n;i++){
    const v = arr[start+i];
    if (v === undefined || v === null) continue;
    m = Math.max(m, v);
  }
  return m === -Infinity ? 0 : m;
}
function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }

function clothingPlan(apparentF, windMph){
  const hotBias = RUN_HOT ? 4 : 0;
  const a = apparentF + hotBias;
  let bottoms, sleeves;
  if (a >= 75) { bottoms="Shorts"; sleeves="Short sleeves"; }
  else if (a >= 65) { bottoms="Shorts"; sleeves="Short sleeves"; }
  else if (a >= 55) { bottoms="Pants"; sleeves=(windMph >= 12 ? "Long sleeves" : "Short sleeves"); }
  else { bottoms="Pants"; sleeves="Long sleeves"; }
  return { bottoms, sleeves };
}
function jacketNeeded(apparentF, tempF, windMph, precipProbMax){
  const bias = RUN_HOT ? -3 : 0;
  const cold = Math.min(apparentF, tempF) + bias;
  const windy = windMph >= 14;
  const wet   = (precipProbMax ?? 0) >= 30;
  const chilly= cold <= 52;
  return (chilly && (windy || wet)) || cold <= 45;
}
function sunscreenNeeded(uvMax4h, isDayNow){ return isDayNow && (uvMax4h ?? 0) >= 3; }
function minutesToNearestSunBoundary(now, sunriseIso, sunsetIso){
  const sunrise = sunriseIso ? new Date(sunriseIso) : null;
  const sunset  = sunsetIso  ? new Date(sunsetIso)  : null;
  if(!sunrise || !sunset) return null;
  const minsSinceSunrise = Math.abs((now - sunrise) / 60000);
  const minsUntilSunset  = Math.abs((sunset - now) / 60000);
  return Math.min(minsSinceSunrise, minsUntilSunset);
}
function sunglassesNeeded(isDayNow, uvNow, minutesToOrFromSunEvent){
  if (!isDayNow) return false;
  const uvOk = (uvNow ?? 0) >= 2;
  const lowSun = minutesToOrFromSunEvent !== null && minutesToOrFromSunEvent <= 90;
  return uvOk || lowSun;
}
function umbrellaNeeded(precipProbMax4h){ return (precipProbMax4h ?? 0) >= 30; }

function dogWalkRating(apparentF, windMph, precipProbMax4h){
  const hotBias = RUN_HOT ? 4 : 0;
  const a = apparentF + hotBias;
  const wet = precipProbMax4h >= 30;
  const windy = windMph >= 16;
  if (wet) return { label:"Plan around rain", emoji:"☔", note:`Rain ${round(precipProbMax4h)}%` };
  if (a >= 82) return { label:"Keep it short", emoji:"🥵", note:"Hot walk" };
  if (a >= 72) return { label:"Good (watch heat)", emoji:"😅", note:"Bring water" };
  if (a >= 55 && a <= 71) return { label:"Perfect", emoji:"🐾", note:"Comfortable" };
  if (a >= 45 && a < 55) return { label:"Brisk", emoji:"🧥", note: windy ? "Windy" : "Cool" };
  if (a < 45) return { label:"Bundle up", emoji:"🥶", note:"Cold paws" };
  return { label:"Okay", emoji:"🐕", note:"" };
}

function timeToRain(timeArr, precipProbArr, startIdx, lookAheadHours=8, threshold=50){
  for (let i=0;i<lookAheadHours;i++){
    const p = precipProbArr[startIdx+i];
    if (p != null && p >= threshold){
      const t = new Date(timeArr[startIdx+i]);
      const mins = Math.max(0, Math.round((t - new Date())/60000));
      if (mins <= 5) return { when: t, text: "Now" };
      if (mins < 60) return { when: t, text: `~${mins}m` };
      return { when: t, text: `~${Math.round(mins/60)}h` };
    }
  }
  return null;
}

function bestWalkWindow(hourly, startIdx, hoursAhead=8){
  const target = RUN_HOT ? 64 : 62;
  const times = hourly.time, feels = hourly.apparent_temperature, rainP = hourly.precipitation_probability, wind = hourly.windspeed_10m;
  let best = null;
  for (let i=0;i<Math.max(0, hoursAhead-1);i++){
    const a0 = feels[startIdx+i], a1 = feels[startIdx+i+1];
    const p0 = rainP[startIdx+i], p1 = rainP[startIdx+i+1];
    const w0 = wind[startIdx+i], w1 = wind[startIdx+i+1];
    if ([a0,a1,p0,p1,w0,w1].some(v => v == null)) continue;
    const score = ((p0+p1)*2.2) + ((Math.abs(a0-target)+Math.abs(a1-target))*1.2) + ((w0+w1)*0.45);
    if (!best || score < best.score){
      best = { score, start:new Date(times[startIdx+i]), end:new Date(times[startIdx+i+2] || times[startIdx+i+1]), rainAvg:(p0+p1)/2, feelsAvg:(a0+a1)/2 };
    }
  }
  return best;
}

async function geocodeZip(zip){
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zip)}&count=1&language=en&format=json&t=${Date.now()}`;
  const r = await fetch(url, { cache:"no-store" });
  const j = await r.json();
  const hit = j?.results?.[0];
  if(!hit) throw new Error("ZIP not found");
  return { lat: hit.latitude, lon: hit.longitude };
}
async function reverseGeocode(lat, lon){
  const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&count=1&language=en&format=json&t=${Date.now()}`;
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) return null;
  const j = await r.json();
  const hit = j?.results?.[0];
  return hit ? { name: hit.name, admin1: hit.admin1 } : null;
}
async function fetchForecast(lat, lon, tz){
  const params = new URLSearchParams({
    latitude: String(lat),
    longitude: String(lon),
    timezone: tz,
    temperature_unit: "fahrenheit",
    windspeed_unit: "mph",
    precipitation_unit: "inch",
    hourly: "temperature_2m,apparent_temperature,precipitation_probability,cloudcover,windspeed_10m,uv_index,is_day,weathercode",
    daily: "temperature_2m_max,temperature_2m_min,sunrise,sunset",
    forecast_days: "2"
  });
  const url = `https://api.open-meteo.com/v1/forecast?${params.toString()}&t=${Date.now()}`;
  const r = await fetch(url, { cache:"no-store" });
  if(!r.ok) throw new Error("Forecast fetch failed");
  return r.json();
}

function bucketFromWeathercode(code){
  if (code === 0) return "clear";
  if ([1,2].includes(code)) return "partly";
  if (code === 3) return "cloudy";
  if ([45,48].includes(code)) return "fog";
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return "rain";
  if (code >= 71 && code <= 77) return "snow";
  if (code >= 95 && code <= 99) return "storm";
  return "cloudy";
}
function timePhaseFromSun(now, sunriseIso, sunsetIso){
  const sunrise = sunriseIso ? new Date(sunriseIso) : null;
  const sunset  = sunsetIso  ? new Date(sunsetIso)  : null;
  if(!sunrise || !sunset) return "day";
  const TW = 75;
  const minsToSunrise = (sunrise - now)/60000;
  const minsFromSunrise = (now - sunrise)/60000;
  const minsToSunset = (sunset - now)/60000;
  if (now < sunrise) return (minsToSunrise <= TW) ? "dawn" : "night";
  if (now >= sunrise && now <= sunset){
    if (minsFromSunrise <= TW) return "dawn";
    if (minsToSunset <= TW) return "dusk";
    return "day";
  }
  return "night";
}
function nextSunEvent(daily, now){
  const sunrise0 = daily.sunrise?.[0] ? new Date(daily.sunrise[0]) : null;
  const sunset0  = daily.sunset?.[0]  ? new Date(daily.sunset[0])  : null;
  const sunrise1 = daily.sunrise?.[1] ? new Date(daily.sunrise[1]) : null;
  const sunset1  = daily.sunset?.[1]  ? new Date(daily.sunset[1])  : null;
  const c = [
    sunrise0 && sunrise0 > now ? { type:"Sunrise", when:sunrise0 } : null,
    sunset0  && sunset0  > now ? { type:"Sunset", when:sunset0 } : null,
    sunrise1 && sunrise1 > now ? { type:"Sunrise", when:sunrise1 } : null,
    sunset1  && sunset1  > now ? { type:"Sunset", when:sunset1 } : null,
  ].filter(Boolean);
  if(!c.length) return null;
  c.sort((a,b)=>a.when-b.when);
  return c[0];
}

function applyAutoMode(isDay){
  const root = document.documentElement.style;
  if (isDay){
    root.setProperty("--fg","rgba(0,0,0,.92)");
    root.setProperty("--muted","rgba(0,0,0,.55)");
    root.setProperty("--stroke","rgba(255,255,255,.92)");
  } else {
    root.setProperty("--fg","rgba(255,255,255,.92)");
    root.setProperty("--muted","rgba(255,255,255,.66)");
    root.setProperty("--stroke","rgba(255,255,255,.14)");
  }
}
function applyTheme({timePhase, condition, umbrella, sunscreen, sunglasses, jacket, tempNow, isDay}){
  const root = document.documentElement.style;
  if (isDay){
    if (timePhase === "dawn"){
      root.setProperty("--bgA", "#f7f0ff");
      root.setProperty("--bgB", "#f6fbff");
      root.setProperty("--bgC", "rgba(255,190,140,.18)");
      root.setProperty("--bgD", "rgba(160,210,255,.12)");
      document.querySelector('meta[name="theme-color"]').setAttribute("content","#f6fbff");
    } else if (timePhase === "dusk"){
      root.setProperty("--bgA", "#fff1f6");
      root.setProperty("--bgB", "#f7fbff");
      root.setProperty("--bgC", "rgba(255,160,210,.16)");
      root.setProperty("--bgD", "rgba(160,210,255,.10)");
      document.querySelector('meta[name="theme-color"]').setAttribute("content","#f7fbff");
    } else {
      root.setProperty("--bgA", "#eef5ff");
      root.setProperty("--bgB", "#fbfcff");
      root.setProperty("--bgC", "rgba(130,180,255,.16)");
      root.setProperty("--bgD", "rgba(140,255,220,.10)");
      document.querySelector('meta[name="theme-color"]').setAttribute("content","#fbfcff");
    }
  } else {
    root.setProperty("--bgA", "#070812");
    root.setProperty("--bgB", "#0b0d18");
    root.setProperty("--bgC", "rgba(140,180,255,.10)");
    root.setProperty("--bgD", "rgba(120,255,220,.06)");
    document.querySelector('meta[name="theme-color"]').setAttribute("content","#070812");
  }

  if (umbrella || condition === "rain" || condition === "storm"){
    root.setProperty("--accent","rgba(120,170,255,1)");
    root.setProperty("--accent2","rgba(120,220,255,1)");
  } else if (sunscreen || sunglasses || condition === "clear"){
    root.setProperty("--accent","rgba(255,195,95,1)");
    root.setProperty("--accent2","rgba(255,140,210,1)");
  } else if (jacket || tempNow <= 45){
    root.setProperty("--accent","rgba(160,220,255,1)");
    root.setProperty("--accent2","rgba(180,255,230,1)");
  } else {
    root.setProperty("--accent","rgba(140,180,255,1)");
    root.setProperty("--accent2","rgba(150,255,220,1)");
  }
}
function sceneSVG({isDay}){
  return isDay
    ? `<svg viewBox="0 0 844 390" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><rect width="844" height="390" fill="rgba(255,255,255,.02)"/></svg>`
    : `<svg viewBox="0 0 844 390" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><rect width="844" height="390" fill="rgba(0,0,0,.08)"/></svg>`;
}

function setScene(html){ $("scene").innerHTML = html; }

function setNowStats(items){
  $("nowStats").innerHTML = items.map(it => `
    <div class="stat">
      <div class="statTop">
        <div class="statIcon">${it.i}</div>
        <div class="statK">${it.k}</div>
      </div>
      <div class="statV">${it.v}</div>
      ${it.b ? `<div class="statB">${it.b}</div>` : ``}
    </div>
  `).join("");
}

let LAST_POS = null;
function getGPSPosition(timeoutMs=6500){
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: false,
      timeout: timeoutMs,
      maximumAge: 10 * 60 * 1000
    });
  });
}
async function getLocation(){
  try{
    const pos = await getGPSPosition();
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    LAST_POS = { lat, lon };
    return { lat, lon, source: "gps" };
  }catch(e){
    if (LAST_POS) return { ...LAST_POS, source: "gps_cached" };
    const g = await geocodeZip(FALLBACK_ZIP);
    return { lat: g.lat, lon: g.lon, source: "zip" };
  }
}

let _timer=null;

async function refresh(){
  try{
    const now = new Date();
    const tz = tzLocal();
    const loc = await getLocation();

    const [fx, place] = await Promise.all([
      fetchForecast(loc.lat, loc.lon, tz),
      reverseGeocode(loc.lat, loc.lon).catch(()=>null)
    ]);

    const h = fx.hourly;
    const d = fx.daily;
    const idx = sameHourIndex(h.time, now);

    const tempNow = h.temperature_2m[idx];
    const appNow  = h.apparent_temperature[idx];
    const windNow = h.windspeed_10m[idx];
    const uvNow   = h.uv_index[idx];
    const cloudNow= h.cloudcover[idx];
    const isDayNow= Boolean(h.is_day[idx]);
    const codeNow = h.weathercode[idx];

    const precipMax4h = maxNextN(h.precipitation_probability, idx, 4);
    const uvMax4h     = maxNextN(h.uv_index, idx, 4);

    const hi = d.temperature_2m_max?.[0];
    const lo = d.temperature_2m_min?.[0];
    const sunrise0 = d.sunrise?.[0];
    const sunset0  = d.sunset?.[0];

    const condition = bucketFromWeathercode(codeNow);
    const timePhase = timePhaseFromSun(now, sunrise0, sunset0);
    const minsSunBoundary = minutesToNearestSunBoundary(now, sunrise0, sunset0);

    const outfit = clothingPlan(appNow, windNow);
    const jacket = jacketNeeded(appNow, tempNow, windNow, precipMax4h);
    const sunscreen = sunscreenNeeded(uvMax4h, isDayNow);
    const sunglasses = sunglassesNeeded(isDayNow, uvNow, minsSunBoundary);
    const umbrella = umbrellaNeeded(precipMax4h);
    const dog = dogWalkRating(appNow, windNow, precipMax4h);

    const ttr = timeToRain(h.time, h.precipitation_probability, idx, 8, 50);
    const best = bestWalkWindow(h, idx, 8);
    const bestText = best ? `${fmtTimeLocal(best.start.toISOString())}–${fmtTimeLocal(best.end.toISOString())}` : "—";

    applyAutoMode(isDayNow);
    applyTheme({timePhase, condition, umbrella, sunscreen, sunglasses, jacket, tempNow, isDay:isDayNow});
    setScene(sceneSVG({isDay:isDayNow}));

    const placeText = place ? `${place.name}${place.admin1 ? ", " + place.admin1 : ""}` : (loc.source.startsWith("gps") ? "Local" : `ZIP ${FALLBACK_ZIP}`);
    $("placeLine").textContent = placeText;
    $("updatedLine").textContent = `Updated ${fmtUpdated(new Date())}`;

    const headlineBits = [];
    headlineBits.push(`${outfit.bottoms}/${outfit.sleeves.includes("Long") ? "long" : "short"} sleeves`);
    if (jacket) headlineBits.push("jacket");
    if (umbrella) headlineBits.push("umbrella");
    if (sunglasses) headlineBits.push("sunglasses");
    if (sunscreen) headlineBits.push("sunscreen");
    $("headlineLine").textContent = headlineBits.join(" • ");

    $("nowMode").textContent =
      condition === "clear"  ? (isDayNow ? "☀️" : "🌙") :
      condition === "partly" ? "🌤️" :
      condition === "cloudy" ? "☁️" :
      condition === "fog"    ? "🌫️" :
      condition === "rain"   ? "🌧️" :
      condition === "snow"   ? "🌨️" :
      condition === "storm"  ? "⛈️" : "☁️";

    $("tempNow").textContent = `${round(tempNow)}°`;
    $("feelsNow").textContent = `feels ${round(appNow)}°`;
    $("heroLine").textContent = `${outfit.bottoms} • ${outfit.sleeves}`;
    $("heroSub").textContent = `${placeText} • wind ${round(windNow)} mph`;

    const nextSun = nextSunEvent(d, now);
    const nextSunTxt = nextSun ? `${nextSun.type} ${fmtTimeLocal(nextSun.when.toISOString())}` : "—";
    const sunEmoji = nextSun ? (nextSun.type === "Sunrise" ? "🌅" : "🌇") : "🗓️";

    setNowStats([
      { i:"☁️", k:"Condition", v: cap(condition), b: isDayNow ? "Day" : "Night" },
      { i:"☔", k:"Rain 4h", v: `${round(precipMax4h)}%`, b: umbrella ? "Bring umbrella" : "Low risk" },
      { i:"🔆", k:"UV", v: isDayNow ? `${round(uvNow)}` : "—", b: isDayNow ? `max ${round(uvMax4h)}` : "Night" },
      { i:sunEmoji, k:"Next sun", v: nextSunTxt, b: `Hi ${round(hi)}° / Lo ${round(lo)}°` }
    ]);

    const wearIcon = outfit.bottoms === "Shorts" ? "🩳" : "👖";
    $("wearValue").textContent = `${outfit.bottoms} • ${outfit.sleeves}`;
    $("wearSub").textContent = "run-hot tuned";
    $("wearIcon").textContent = wearIcon;

    const bringList = [];
    if (jacket) bringList.push("Jacket");
    if (umbrella) bringList.push("Umbrella");
    $("bringValue").textContent = bringList.length ? bringList.join(" + ") : "Nothing extra";
    $("bringSub").textContent = ttr ? `Rain ≥50%: ${ttr.text}` : `Next 8h max ${round(maxNextN(h.precipitation_probability, idx, 8))}%`;
    $("bringIcon").textContent = umbrella ? "☔" : (jacket ? "🧥" : "✅");

    const protectList = [];
    if (sunscreen) protectList.push("Sunscreen");
    if (sunglasses) protectList.push("Sunglasses");
    $("protectValue").textContent = protectList.length ? protectList.join(" + ") : "No extras";
    $("protectSub").textContent = isDayNow ? `UV max ${round(uvMax4h)}` : "Night";
    $("protectIcon").textContent = sunglasses ? "🕶️" : (sunscreen ? "🧴" : "✨");

    $("dogValue").textContent = dog.label;
    $("dogSub").textContent = dog.note || `Wind ${round(windNow)} mph`;

    $("walkValue").textContent = bestText;
    $("walkSub").textContent = best ? `Feels ~${round(best.feelsAvg)}° • Rain ~${round(best.rainAvg)}%` : `Feels now ${round(appNow)}°`;

    $("rainValue").textContent = ttr ? ttr.text : "No near rain";
    $("rainSub").textContent = ttr ? "Time until ≥50% rain risk" : `4h max ${round(precipMax4h)}%`;
  } catch (e){
    console.error(e);
    $("updatedLine").textContent = "Offline";
    $("headlineLine").textContent = "Check Wi-Fi";
  }
}

refresh();
clearInterval(_timer);
_timer = setInterval(refresh, REFRESH_MS);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });
</script>
