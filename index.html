<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b0d18" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Leave the House</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <main class="layout">
      <section class="actionsStack">
        <section class="card action wearCard" id="wearCard">
          <div class="actionTop">
            <div class="actionLabel">Wear</div>
            <div class="actionIcon" id="wearIcon">👖</div>
          </div>
          <div class="actionValue" id="wearValue">—</div>
          <div class="actionSub" id="wearSub">—</div>
        </section>

        <section class="card action hidden" id="protectCard">
          <div class="actionTop">
            <div class="actionLabel">Protect</div>
            <div class="actionIcon" id="protectIcon">🕶️</div>
          </div>
          <div class="actionValue" id="protectValue">—</div>
          <div class="actionSub" id="protectSub">—</div>
        </section>

        <section class="card action hidden" id="bringCard">
          <div class="actionTop">
            <div class="actionLabel">Bring</div>
            <div class="actionIcon" id="bringIcon">☔</div>
          </div>
          <div class="actionValue" id="bringValue">—</div>
          <div class="actionSub" id="bringSub">—</div>
        </section>

        <section class="card action walkCard" id="walkCard">
          <div class="actionTop">
            <div class="actionLabel">Dog walk</div>
            <div class="actionIcon" id="walkIcon">🐾</div>
          </div>
          <div class="actionValue" id="walkPrimary">—</div>
          <div class="actionSub" id="walkSecondary">—</div>
          <div class="actionSub actionSubTertiary" id="walkTertiary">—</div>
        </section>
      </section>

      <section class="card nowCard">
        <div class="nowTop">
          <div class="timeNow" id="timeNow">--:--</div>
          <div class="updated" id="updatedLine">Updated —</div>
        </div>

        <div class="nowMain">
          <div class="tempWrap">
            <div class="temp" id="tempNow">—°</div>
            <div class="feels" id="feelsNow">feels —°</div>
          </div>
          <div class="mode" id="modeIcon">☀️</div>
        </div>

        <div class="condition" id="conditionLine">—</div>
        <div class="ambient" id="ambientLine">—</div>

        <div class="stats" id="stats"></div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
